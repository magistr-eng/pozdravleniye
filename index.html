<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С праздником, Папа!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            cursor: default;
        }

        /* Конфетти */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall linear infinite;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Основной контейнер */
        .main-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Карточка */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            max-width: 600px;
            width: 100%;
            animation: cardAppear 1.5s ease-out;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px) rotateX(5deg) rotateY(5deg);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.4);
        }

        @keyframes cardAppear {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Иконка */
        .cake-icon {
            font-size: 80px;
            animation: bounce 2s ease-in-out infinite;
            margin-bottom: 20px;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* Текст */
        .title {
            color: #FFD700;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 25px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            }
            50% {
                text-shadow: 0 0 40px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.4);
            }
        }

        .message {
            color: rgba(255, 255, 255, 0.95);
            font-size: 22px;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        /* Кнопка */
        .celebrate-btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .celebrate-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.5);
        }

        .celebrate-btn:active {
            transform: scale(0.95);
        }

        /* Свечи */
        .candles-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .candle {
            position: relative;
            width: 30px;
            height: 60px;
        }

        .candle-body {
            width: 100%;
            height: 70%;
            background: linear-gradient(to right, #ff6b6b, #ee5a24);
            border-radius: 5px 5px 0 0;
            position: relative;
        }

        .candle-flame {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 25px;
            background: radial-gradient(circle, #FFD700, #FFA500);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flicker 0.5s ease-in-out infinite alternate;
        }

        @keyframes flicker {
            0% {
                transform: translateX(-50%) scale(1, 1);
                opacity: 0.9;
            }
            100% {
                transform: translateX(-50%) scale(1.1, 0.9);
                opacity: 1;
            }
        }

        /* Частицы при клике */
        .spark {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            animation: sparkFly 0.8s ease-out forwards;
        }

        @keyframes sparkFly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            .title {
                font-size: 36px;
            }
            .message {
                font-size: 18px;
            }
            .card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="confetti-container" id="confetti"></div>

    <div class="main-container">
        <div class="card" id="card">
            <div class="cake-icon">🎉</div>
            <h1 class="title">Папа, с праздником!</h1>
            
            <p class="message">
                Желаю крепчайшего здоровья, стальных нервов<br>
                и удачи во всех делах.<br><br>
                Крепко жму руку! 🤝
            </p>

            <button class="celebrate-btn" id="celebrateBtn">
                🎉 Поздравить! 🎉
            </button>
            
            <div class="candles-container">
                <div class="candle">
                    <div class="candle-flame"></div>
                    <div class="candle-body"></div>
                </div>
                <div class="candle">
                    <div class="candle-flame"></div>
                    <div class="candle-body"></div>
                </div>
                <div class="candle">
                    <div class="candle-flame"></div>
                    <div class="candle-body"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Создание конфетти
        function createConfetti() {
            const confettiContainer = document.getElementById('confetti');
            const colors = ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#FF8C00'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 5 + 's';
                confetti.style.width = (Math.random() * 10 + 5) + 'px';
                confetti.style.height = (Math.random() * 10 + 5) + 'px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confettiContainer.appendChild(confetti);
            }
        }

        // Создание искр при клике
        function createSparks(x, y) {
            const sparkCount = 20;
            const emojis = ['✨', '⭐', '💫', '🌟', '💝', '🎉', '🎊', '💖'];
            
            for (let i = 0; i < sparkCount; i++) {
                const spark = document.createElement('div');
                spark.classList.add('spark');
                spark.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                spark.style.position = 'fixed';
                spark.style.left = x + 'px';
                spark.style.top = y + 'px';
                spark.style.fontSize = (Math.random() * 20 + 10) + 'px';
                spark.style.pointerEvents = 'none';
                spark.style.zIndex = '1000';
                
                const angle = (Math.random() * 360) * Math.PI / 180;
                const distance = Math.random() * 150 + 50;
                spark.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
                spark.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
                
                document.body.appendChild(spark);
                
                setTimeout(() => {
                    spark.remove();
                }, 1000);
            }
        }

        // Запуск фейерверка
        function launchFirework() {
            const emojis = ['🎆', '🎇', '🎉', '🎊', '🎈', '💝', '🌟', '✨'];
            const container = document.createElement('div');
            container.style.position = 'fixed';
            container.style.pointerEvents = 'none';
            container.style.zIndex = '999';
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('span');
                particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                particle.style.position = 'absolute';
                particle.style.fontSize = (Math.random() * 30 + 15) + 'px';
                
                const angle = (Math.random() * 360) * Math.PI / 180;
                const velocity = Math.random() * 200 + 100;
                const dx = Math.cos(angle) * velocity;
                const dy = Math.sin(angle) * velocity;
                
                particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${dx}px, ${dy}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 1500,
                    easing: 'cubic-bezier(0, 0.9, 0.57, 1)',
                    fill: 'forwards'
                });
                
                container.appendChild(particle);
            }
            
            container.style.left = '50%';
            container.style.top = '50%';
            document.body.appendChild(container);
            
            setTimeout(() => {
                container.remove();
            }, 2000);
        }

        // Эффект параллакса для карточки
        function addParallaxEffect() {
            const card = document.getElementById('card');
            
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
            
            document.addEventListener('mouseleave', () => {
                card.style.transform = 'rotateY(0deg) rotateX(0deg)';
                card.style.transition = 'transform 0.5s ease';
            });
            
            document.addEventListener('mouseenter', () => {
                card.style.transition = 'transform 0.1s ease';
            });
        }

        // Запуск всего
        function init() {
            createConfetti();
            addParallaxEffect();
            
            // Кнопка празднования
            document.getElementById('celebrateBtn').addEventListener('click', (e) => {
                launchFirework();
                createSparks(e.clientX, e.clientY);
                
                // Запускаем несколько фейерверков последовательно
                setTimeout(() => launchFirework(), 200);
                setTimeout(() => launchFirework(), 400);
                
                // Создаем больше конфетти
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => createConfetti(), i * 100);
                }
            });
            
            // Клик по карточке тоже создает искры
            document.getElementById('card').addEventListener('click', (e) => {
                if (e.target.id !== 'celebrateBtn') {
                    createSparks(e.clientX, e.clientY);
                }
            });
            
            // Двойной клик запускает фейерверк
            document.addEventListener('dblclick', (e) => {
                launchFirework();
                createSparks(e.clientX, e.clientY);
            });
        }

        // Запуск при загрузке страницы
        window.addEventListener('load', init);
        
        // Периодически добавляем новые конфетти
        setInterval(createConfetti, 5000);
    </script>
</body>
</html>
